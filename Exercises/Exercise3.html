<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 2</title>

  </head>
  <body>
    <header></header>
    <main>
      <script>
      // Задача 3
      // Data
      let itemCount = parseFloat(prompt('Скільки одиниць товару ви купили?', '2'))
      let itemPrice = parseFloat(prompt('Скільки коштує товар?', '5$'))
      const vatPercentage = 5
      // Operations
      let totalCost = ( itemCount * itemPrice ) * vatPercentage / 100 
      // Output
      document.write(`
        <div>
              <h2 style="font-family: Arial, Helvetica, sans-serif; margin-left: 20px;">Задача 3</h2>
              <ul style="font-family: Arial, Helvetica, sans-serif; list-style-type: none;">
                <li>Величина ПДВ ${totalCost}</li>
              </ul>
        </div>
      `)  
    </script>
    </main>
    <footer>

    </footer>
  </body>
</html>
