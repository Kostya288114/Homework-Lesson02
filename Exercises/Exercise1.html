<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 2</title>

  </head>
  <body>
    <header></header>
    <main>
      <script>
      // Задача 1
      // Data
      let a = parseFloat(prompt('Введіть значення a', '0'))
      let b = parseFloat(prompt('Введіть значення b', '2'))
      // Operations
      let sumaAB = a + b
      let productAB = a * b
      let fractionAB = a / b
      // Output
      document.write(`
        <div>
              <h2 style="font-family: Arial, Helvetica, sans-serif; margin-left: 20px;">Задача 1</h2>
              <ul style="font-family: Arial, Helvetica, sans-serif; list-style-type: none;">
                <li> <span style="font-weight: bold;">1)</span> ${sumaAB}</li>
                <li> <span style="font-weight: bold;">2)</span> ${productAB}</li>
                <li> <span style="font-weight: bold;">3)</span> ${fractionAB}</li>
              </ul>
        </div>
      `)  
    </script>
    </main>
    <footer>

    </footer>
  </body>
</html>
