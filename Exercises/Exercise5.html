<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homework 2</title>

  </head>
  <body>
    <header></header>
    <main>
      <script>
      // Задача 5
      // Data
      let secondsData = parseFloat(prompt('Скільки секундів пройшли від початку доби?', '1000s'))
      // Operations
      let minutesData = secondsData / 60
      let hoursData = secondsData / 3600
      // Output
      document.write(`
        <div>
              <h2 style="font-family: Arial, Helvetica, sans-serif; margin-left: 20px;">Задача 5</h2>
              <ul style="font-family: Arial, Helvetica, sans-serif; list-style-type: none;">
                <li>${secondsData} секунд це ${minutesData} хвилин або ${hoursData} годин.</li>
              </ul>
        </div>
      `)  
    </script>
    </main>
    <footer>

    </footer>
  </body>
</html>
